# Simple workflow for deploying a static Vite site to GitHub Pages
name: Deploy Vite Site to Pages

on:
  # Runs on pushes targeting the specified branches
  push:
    branches: ["main", "feature/multi-university-refactor"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Validate Mapbox public token secret
        env:
          VITE_MAPBOX_PUBLIC_TOKEN: ${{ secrets.VITE_MAPBOX_PUBLIC_TOKEN }}
        run: |
          node -e "const t=(process.env.VITE_MAPBOX_PUBLIC_TOKEN||'' ).trim(); console.log('Mapbox token present:', t.length > 0); console.log('Mapbox token length:', t.length); if(!/^pk\./i.test(t)){ console.error('VITE_MAPBOX_PUBLIC_TOKEN is missing or invalid. It must start with pk.'); process.exit(1); }"
      - name: Build
        run: npm run build
        env:
          VITE_MAPBOX_PUBLIC_TOKEN: ${{ secrets.VITE_MAPBOX_PUBLIC_TOKEN }}
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the "dist" directory
          path: './dist'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        

